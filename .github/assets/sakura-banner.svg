<svg xmlns="http://www.w3.org/2000/svg" width="860" height="240" viewBox="0 0 860 240" fill="none" role="img" aria-label="hayatog">
  <!-- ═══ KatanaMode · nanquim sobre creme · sakura caindo (SMIL) ═══ -->
  <defs>
    <!-- vinheta creme sutil -->
    <radialGradient id="cream" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#F7F5EF"/>
      <stop offset="100%" stop-color="#F1EEE6"/>
    </radialGradient>
    <!-- pétala de sakura: 5 lóbulos, entalhe no topo -->
    <g id="petal">
      <path d="M0,-6 C2.6,-6 4.3,-3.4 4.3,-0.6 C4.3,2.2 2.4,4.6 0,6.2
               C-2.4,4.6 -4.3,2.2 -4.3,-0.6 C-4.3,-3.4 -2.6,-6 0,-6
               M0,-6 C-0.7,-4.6 -0.7,-3.2 0,-2.2 C0.7,-3.2 0.7,-4.6 0,-6 Z"/>
    </g>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DAD7CE"/>
      <stop offset="50%" stop-color="#7E1C1C"/>
      <stop offset="100%" stop-color="#DAD7CE"/>
    </linearGradient>
  </defs>

  <!-- fundo -->
  <rect x="1" y="1" width="858" height="238" rx="10" fill="url(#cream)" stroke="#DAD7CE" stroke-width="1.5"/>

  <!-- ░ pétalas caindo (cada uma cai + gira + oscila em X) ░ -->
  <g fill="#7E1C1C" opacity="0.85">
    <!-- pétala 1 -->
    <use href="#petal" x="120" y="0" opacity="0.55">
      <animateTransform attributeName="transform" type="translate" values="0,-30; 20,270" dur="7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" values="0;360" dur="4s" repeatCount="indefinite"/>
    </use>
    <!-- pétala 2 -->
    <use href="#petal" x="300" y="0" opacity="0.7">
      <animateTransform attributeName="transform" type="translate" values="0,-40; -25,275" dur="9s" begin="-2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" values="360;0" dur="5s" repeatCount="indefinite"/>
    </use>
    <!-- pétala 3 -->
    <use href="#petal" x="470" y="0" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="0,-20; 30,280" dur="6.5s" begin="-4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" values="0;-360" dur="3.5s" repeatCount="indefinite"/>
    </use>
    <!-- pétala 4 -->
    <use href="#petal" x="620" y="0" opacity="0.65">
      <animateTransform attributeName="transform" type="translate" values="0,-50; -20,270" dur="8s" begin="-1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" values="0;360" dur="4.5s" repeatCount="indefinite"/>
    </use>
    <!-- pétala 5 -->
    <use href="#petal" x="740" y="0" opacity="0.55">
      <animateTransform attributeName="transform" type="translate" values="0,-35; 15,278" dur="7.5s" begin="-5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" values="360;0" dur="4s" repeatCount="indefinite"/>
    </use>
    <!-- pétala 6 -->
    <use href="#petal" x="210" y="0" opacity="0.45">
      <animateTransform attributeName="transform" type="translate" values="0,-25; -30,282" dur="10s" begin="-3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" values="0;-360" dur="6s" repeatCount="indefinite"/>
    </use>
    <!-- pétala 7 -->
    <use href="#petal" x="540" y="0" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="0,-45; 25,272" dur="8.5s" begin="-6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" additive="sum" values="0;360" dur="5s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- ░ galho de sakura no canto superior esquerdo ░ -->
  <g stroke="#0C0C0B" stroke-width="1.3" fill="none" opacity="0.75">
    <path d="M0,26 C40,20 70,34 96,30 C120,26 138,40 150,36"/>
    <path d="M96,30 C104,20 116,16 126,20"/>
  </g>
  <g fill="#7E1C1C" opacity="0.8">
    <use href="#petal" x="60" y="28" transform="scale(1.1)"/>
    <use href="#petal" x="112" y="24" transform="scale(0.9)"/>
    <use href="#petal" x="128" y="20" transform="scale(1.05)"/>
    <use href="#petal" x="126" y="20"/>
  </g>

  <!-- ░ rótulo ░ -->
  <text x="430" y="86" text-anchor="middle" font-family="'Archivo','Segoe UI',sans-serif"
        font-size="14" letter-spacing="7" fill="#A6A49D">─  O  A R T E S Ã O  ─</text>

  <!-- ░ NOME ░ Cormorant/serifa editorial -->
  <text x="430" y="164" text-anchor="middle"
        font-family="'Cormorant Garamond','Georgia',serif" font-size="92" font-weight="500"
        fill="#0C0C0B" letter-spacing="2">hayatog</text>

  <!-- ░ traço com acento vermelho no centro ░ -->
  <rect x="300" y="192" width="260" height="1.5" fill="url(#stroke)"/>

  <!-- ░ quote ░ -->
  <text x="430" y="220" text-anchor="middle" font-style="italic"
        font-family="'Cormorant Garamond','Georgia',serif" font-size="20" fill="#6F6E69">「 Levante a cabeça e prossiga com sua vida. 」</text>
</svg>
